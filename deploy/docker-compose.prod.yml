services:
  backend:
    image: ghcr.io/your-org/lillian-backend:0.1.0
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    ports:
      - "${PORT:-8787}:${PORT:-8787}"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lillian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lillian}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lillian} -d $${POSTGRES_DB:-lillian}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
