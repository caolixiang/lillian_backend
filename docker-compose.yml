services:
  backend:
    build:
      context: .
    environment:
      APP_ENV: local
      PORT: 8787
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:5173}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://127.0.0.1:8787}
      DATABASE_URL: postgres://lillian:lillian@postgres:5432/lillian?sslmode=disable
      AUTO_MIGRATE: "true"
      MIGRATIONS_DIR: migrations
      ADMIN_TOKEN: ${ADMIN_TOKEN:-replace-with-admin-token}
      LICENSE_KEY_PEPPER: ${LICENSE_KEY_PEPPER:-replace-with-license-key-pepper}
      PROVIDER_CREDENTIAL_SECRET: ${PROVIDER_CREDENTIAL_SECRET:-replace-with-provider-secret}
      UPSTREAM_TIMEOUT_SECONDS: ${UPSTREAM_TIMEOUT_SECONDS:-600}
      TASK_POLL_INTERVAL_SECONDS: ${TASK_POLL_INTERVAL_SECONDS:-2}
      TASK_WORKER_CONCURRENCY: ${TASK_WORKER_CONCURRENCY:-2}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: lillian-images
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://127.0.0.1:9000/lillian-images}
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lillian
      POSTGRES_PASSWORD: lillian
      POSTGRES_DB: lillian
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lillian -d lillian"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$${S3_ACCESS_KEY_ID:-minioadmin}" "$${S3_SECRET_ACCESS_KEY:-minioadmin}"; do sleep 1; done
        mc mb --ignore-existing local/lillian-images
        mc anonymous set download local/lillian-images
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}

volumes:
  postgres-data:
  minio-data:
