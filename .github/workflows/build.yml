name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/admin/package-lock.json

      - name: Build admin frontend
        run: |
          npm --prefix web/admin ci
          npm --prefix web/admin run build

      - name: Test
        run: go test ./...

      - name: Build binary
        run: go build -trimpath -ldflags="-X main.version=$(cat VERSION)" -o /tmp/lillian-backend ./cmd/backend

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        run: |
          VERSION="$(cat VERSION)"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            echo "VERSION=${VERSION}"
            echo "IMAGE=${IMAGE}"
            echo "TAGS<<EOF"
            echo "${IMAGE}:${VERSION}"
            if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${IMAGE}:latest"
            fi
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${IMAGE}:${GITHUB_REF_NAME#v}"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.TAGS }}
          build-args: |
            VERSION=${{ env.VERSION }}
